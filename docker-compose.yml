version: '3.8'

services:
  ai-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ai-response-server
    restart: unless-stopped
    ports:
      - "3000:3000"  # HTTP API + WebSocket
      - "3001:3001"  # TCP Socket
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TCP_PORT=3001
      - DB_PATH=/app/data/ai_server.db
      - LOGS_DIR=/app/data/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 可选: Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: ai-server-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - ai-server

networks:
  default:
    name: ai-server-network
